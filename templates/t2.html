		function resizeCanvas(width, height) {
			canvas.width = width;
			canvas.height = height;
        }

        resizeCanvas(1280, 720);
        
        if (isMobile()) {
            canvas.style = 'width: auto; height: 100%; !important';
        }
        else {
            canvas.style = 'width: 100%; height: auto; !important';
        }


		const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
		let ws = {
            send: (data) => {
                fetch('/' + data, {method: 'POST',}).catch(error => {});
            },}


		// --------------------- DESKTOP EVENTS --------------------- //
		// Only attach desktop keyboard if device has physical keyboard
		if (!isMobile()) {
			canvas.addEventListener('mousemove', e => {
				ws.send(JSON.stringify({ type: 'mouse', action: 'move', x: e.offsetX, y: e.offsetY }));
			});
			canvas.addEventListener('mousedown', e => {
				ws.send(JSON.stringify({ type: 'mouse', action: 'down', x: e.offsetX, y: e.offsetY, button: e.button }));
			});
			canvas.addEventListener('mouseup', e => {
				ws.send(JSON.stringify({ type: 'mouse', action: 'up', x: e.offsetX, y: e.offsetY, button: e.button }));
			});

			
            window.addEventListener('keydown', e => ws.send(JSON.stringify({ type: 'keyboard', action: 'down', key: e.key })));
  		    window.addEventListener('keyup', e => ws.send(JSON.stringify({ type: 'keyboard', action: 'up', key: e.key })));
		}

		else
		{
			const input = document.querySelector('#myInput');

			const ontouch = e => {
				e.preventDefault();
				input.focus();

				const touch = e.changedTouches[0];
				const rect = canvas.getBoundingClientRect();
				const x = touch.clientX - rect.left;
				const y = touch.clientY - rect.top;

				ws.send(JSON.stringify({ type: 'mouse', action: 'down', x, y }));
				ws.send(JSON.stringify({ type: 'mouse', action: 'up', x, y }));

			}
			
			canvas.addEventListener('touchend', ontouch);
			document.body.addEventListener('touchend', ontouch);


			input.focus();

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' || e.key === 'Enter') {
                    ws.send(JSON.stringify({ type: 'keyboard', action: 'down', key: e.key }));
					ws.send(JSON.stringify({ type: 'keyboard', action: 'up', key: e.key }));

                    // Do something, e.g., remove a character manually
                }
            });

			input.addEventListener('input', (e) => {
				console.log('Current value:', e.target.value);
				// Do get request to current server on /test

				if (e.target.value === '') return;

				//fetch('/__' + e.target.value, {method: 'POST',}).catch(error => {});
				//ws.send(JSON.stringify({ type: 'keyboard', action: 'down', key: e.key }))

				// Send input as keypresses to ws
				for (let i = 0; i < e.target.value.length; i++) {
					ws.send(JSON.stringify({ type: 'keyboard', action: 'down', key: e.target.value[i] }));
					ws.send(JSON.stringify({ type: 'keyboard', action: 'up', key: e.target.value[i] }));
				}

				// Reset the input value
				e.target.value = '';
			});
		}
